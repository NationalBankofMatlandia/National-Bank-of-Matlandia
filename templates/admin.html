{% extends 'base.html' %}
{% block content %}
<h2>Admin Dashboard</h2>
<p>Balance: {{ user.balance }} MJV</p>

<h3>Mint / Burn Currency</h3>
<form method="POST">
    <input type="number" step="0.01" name="mint_amount" placeholder="Amount to Mint">
    <button type="submit" name="mint">Mint</button>
</form>
<form method="POST">
    <input type="number" step="0.01" name="burn_amount" placeholder="Amount to Burn">
    <button type="submit" name="burn">Burn</button>
</form>

<h3>All Users</h3>
<ul>
    {% for u in all_users %}
        <li>{{ u.username }} - Balance: {{ u.balance }} MJV - Loans: {{ u.loans|length }}</li>
    {% endfor %}
</ul>
{% endblock %}
