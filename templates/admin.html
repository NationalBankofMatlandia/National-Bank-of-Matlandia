{% extends "base.html" %}
{% block content %}
<h2>Admin Panel - Bank Treasury: {{ bank.treasury }} MJV</h2>

<h3>Users</h3>
<table>
    <tr><th>Username</th><th>Email</th><th>Balance</th><th>Debt</th><th>Actions</th></tr>
    {% for u in users %}
    <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.balance }}</td>
        <td>{{ u.debt }}</td>
        <td>
            <form method="post" action="{{ url_for('add_money') }}" style="display:inline;">
                <input type="hidden" name="user" value="{{ u.username }}">
                <input type="number" step="0.01" name="amount" placeholder="Add MJV" required>
                <button type="submit">Add</button>
            </form>
            <form method="post" action="{{ url_for('remove_money') }}" style="display:inline;">
                <input type="hidden" name="user" value="{{ u.username }}">
                <input type="number" step="0.01" name="amount" placeholder="Remove MJV" required>
                <button type="submit">Remove</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<p><a href="{{ url_for('logout') }}">Logout</a></p>
{% endblock %}
