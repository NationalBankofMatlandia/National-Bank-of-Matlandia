<h2>Governor Panel</h2>

<p>Balance: {{ user.balance }} MJV</p>

<h3>Send Money</h3>
<form method="POST">
    <input name="recipient" placeholder="Username">
    <input name="amount" type="number" step="0.01">
    <button name="send">Send</button>
</form>

<h3>Mint MJV</h3>
<form method="POST">
    <input name="mint" type="number">
    <button name="mint">Mint</button>
</form>

<h3>Burn MJV</h3>
<form method="POST">
    <input name="burn" type="number">
    <button name="burn">Burn</button>
</form>

<h3>Users</h3>
<table>
<tr><th>Username</th><th>Email</th><th>Balance</th></tr>
{% for u in users %}
<tr>
<td>{{ u.username }}</td>
<td>{{ u.email }}</td>
<td>{{ u.balance }}</td>
</tr>
{% endfor %}
</table>
