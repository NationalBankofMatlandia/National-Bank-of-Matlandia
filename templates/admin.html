<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - National Bank of Matlandia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Narodna Banka Matlandije">
            <h1>Admin Panel</h1>
        </header>

        <h3>Bank Treasury: {{ bank.treasury }} MJV</h3>

        <h3>Create MJV</h3>
        <form method="POST">
            <input type="number" step="0.01" name="amount" required>
            <button type="submit" name="create_mjv">Add to Treasury</button>
        </form>

        <h3>Users</h3>
        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Balance</th>
                <th>Debt</th>
                <th>Actions</th>
            </tr>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.balance }}</td>
                <td>{{ u.debt }}</td>
                <td>
                    <form method="POST" style="display:inline;">
                        <input type="hidden" name="user_id" value="{{ u.id }}">
                        <button type="submit" name="delete_user">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>

        <p><a href="/dashboard">Back to Dashboard</a> | <a href="/logout">Logout</a></p>
    </div>
</body>
</html>
