{% extends "base.html" %}
{% block content %}
<h2>Admin Panel</h2>
<p>Bank Treasury: {{ bank.treasury }} MJV</p>

<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Balance</th>
            <th>Debt</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.balance }}</td>
            <td>{{ user.debt }}</td>
            <td>
                <form method="POST" action="{{ url_for('add_money') }}">
                    <input type="hidden" name="user" value="{{ user.username }}">
                    <input type="number" name="amount" placeholder="Amount" step="0.01" required>
                    <button type="submit">Add</button>
                </form>
                <form method="POST" action="{{ url_for('remove_money') }}">
                    <input type="hidden" name="user" value="{{ user.username }}">
                    <input type="number" name="amount" placeholder="Amount" step="0.01" required>
                    <button type="submit">Remove</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
