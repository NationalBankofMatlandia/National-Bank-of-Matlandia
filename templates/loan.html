{% extends "base.html" %}
{% block content %}
<h2>Loan</h2>
<p>Your current debt: {{ user.debt }} MJV</p>
<form method="post">
    <input type="number" step="0.01" name="amount" placeholder="Loan amount" required>
    <button type="submit">Take Loan</button>
</form>
<a href="/dashboard">Back to Dashboard</a>
{% endblock %}
