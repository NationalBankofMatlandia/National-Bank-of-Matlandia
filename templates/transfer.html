<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transfer MJV</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h2>Transfer MJV</h2>
<p>Balance: {{ balance }} MJV</p>
<form method="POST">
<label>Recipient Username:</label><input type="text" name="recipient" required><br>
<label>Amount:</label><input type="number" step="0.01" name="amount" required><br>
<button type="submit">Send</button>
</form>
<a href="/">Home</a> | <a href="/logout">Logout</a>
</body>
</html>
