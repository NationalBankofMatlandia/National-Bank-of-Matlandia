{% extends 'base.html' %}
{% block content %}
<h2>Transfer Money</h2>
<form method="POST">
    <input type="text" name="recipient" placeholder="Recipient Username" required><br>
    <input type="number" step="0.01" name="amount" placeholder="Amount (MJV)" required><br>
    <button type="submit">Send</button>
</form>
{% endblock %}
