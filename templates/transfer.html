{% extends "base.html" %}
{% block content %}
<h2>Transfer MJV</h2>
<p>Your current balance: {{ user.balance }} MJV</p>
<form method="post">
    <input type="text" name="recipient" placeholder="Recipient username" required><br>
    <input type="number" step="0.01" name="amount" placeholder="Amount" required><br>
    <button type="submit">Send</button>
</form>
<a href="/dashboard">Back to Dashboard</a>
{% endblock %}
