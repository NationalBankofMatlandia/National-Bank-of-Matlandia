{% extends "base.html" %}
{% block content %}
<h2>Transfer MJV</h2>
<form method="POST">
    <input type="text" name="recipient" placeholder="Recipient Username" required>
    <input type="number" step="0.01" name="amount" placeholder="Amount MJV" required>
    <button type="submit">Send</button>
</form>
<p>Your current balance: {{ "%.2f"|format(user.balance) }} MJV</p>
{% endblock %}
