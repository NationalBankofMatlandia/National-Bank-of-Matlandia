<link rel="stylesheet" href="/static/style.css">

<h2>{{ user.username }}</h2>
<p>Balance: {{ user.balance }} MJV</p>
<p>Loan: {{ user.loan }} MJV</p>

<form action="/transfer" method="POST">
<input name="to" placeholder="Recipient">
<input name="amount">
<button>Send</button>
</form>

<form action="/loan" method="POST">
<input name="amount">
<button>Loan</button>
</form>

<form action="/repay" method="POST">
<input name="amount">
<button>Repay</button>
</form>
