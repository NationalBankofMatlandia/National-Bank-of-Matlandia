{% extends "base.html" %}
{% block content %}
<h2>Repay Debt</h2>
<p>Your current balance: {{ user.balance }} MJV</p>
<p>Your current debt: {{ user.debt }} MJV</p>
<form method="post">
    <input type="number" step="0.01" name="amount" placeholder="Repay amount" required>
    <button type="submit">Repay</button>
</form>
<a href="/dashboard">Back to Dashboard</a>
{% endblock %}
