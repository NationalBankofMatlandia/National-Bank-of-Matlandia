{% extends "base.html" %}
{% block content %}
<h2>Repay Loan</h2>
<form method="POST">
    <input type="number" step="0.01" name="amount" placeholder="Amount MJV" required>
    <button type="submit">Repay</button>
</form>
<p>Your current balance: {{ "%.2f"|format(user.balance) }} MJV</p>
<p>Your current debt: {{ "%.2f"|format(user.debt) }} MJV</p>
{% endblock %}
