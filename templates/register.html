<!DOCTYPE html>
<html lang="en">
<head>

    <title>Register - National Bank of Matlandia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>Register</h1>
<form method="POST">

</form>

</html>
